<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spirit Island Campaign</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    .island-bg { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); }
    .tab { display: none; }
    .tab.active { display: block; }
    .spirit-card { transition: all 0.3s; }
    .spirit-card.completed { background-color: #10b981; color: white; box-shadow: 0 0 20px #10b981; }
  </style>
</head>
<body class="island-bg text-white min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <div class="flex items-center gap-4">
        <i class="fa-solid fa-leaf text-5xl text-emerald-400"></i>
        <h1 class="text-4xl font-bold">Spirit Island Campaign</h1>
      </div>
      <div class="flex gap-2 flex-wrap">
        <button onclick="switchTab(0)" class="tab-btn px-6 py-3 rounded-2xl bg-emerald-700 hover:bg-emerald-600">🏠 Dashboard</button>
        <button onclick="switchTab(1)" class="tab-btn px-6 py-3 rounded-2xl hover:bg-white/10">📝 Log Game</button>
        <button onclick="switchTab(2)" class="tab-btn px-6 py-3 rounded-2xl hover:bg-white/10">🛤️ Solo Campaign</button>
        <button onclick="switchTab(3)" class="tab-btn px-6 py-3 rounded-2xl hover:bg-white/10">👥 Multi-Spirit Campaigns</button>
        <button onclick="switchTab(4)" class="tab-btn px-6 py-3 rounded-2xl hover:bg-white/10">📊 Stats</button>
        <button onclick="switchTab(5)" class="tab-btn px-6 py-3 rounded-2xl hover:bg-white/10">⚙️ Settings</button>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="tab0" class="tab active">
      <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 mb-8">
        <h2 class="text-3xl font-bold mb-2">Welcome back, Guardian</h2>
        <div id="next-step" class="bg-emerald-900/70 rounded-2xl p-6 text-xl font-medium"></div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white/10 rounded-2xl p-6 text-center">
          <p class="text-emerald-300 text-sm">SOLO SPIRITS MASTERED</p>
          <p id="solo-mastered" class="text-6xl font-bold text-emerald-400">0 / 12</p>
        </div>
        <div class="bg-white/10 rounded-2xl p-6 text-center">
          <p class="text-amber-300 text-sm">MULTI-SPIRIT CAMPAIGNS</p>
          <p id="multi-count" class="text-6xl font-bold text-amber-400">0</p>
        </div>
        <div class="bg-white/10 rounded-2xl p-6 text-center">
          <p class="text-sky-300 text-sm">WIN RATE</p>
          <p id="win-rate" class="text-6xl font-bold text-sky-400">—</p>
        </div>
      </div>
    </div>

    <!-- LOG GAME -->
    <div id="tab1" class="tab">
      <h2 class="text-3xl mb-6">Log a Game</h2>
      <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 max-w-2xl mx-auto">
        <input id="spirits-input" class="w-full bg-white/10 rounded-2xl p-4 mb-4" placeholder="Spirit(s) used">
        <div class="grid grid-cols-2 gap-4 mb-4">
          <select id="adversary-select" class="bg-white/10 rounded-2xl p-4"></select>
          <input id="level-input" type="number" min="0" max="7" value="0" class="bg-white/10 rounded-2xl p-4 text-center">
        </div>
        <input id="scenario-input" class="w-full bg-white/10 rounded-2xl p-4 mb-4" placeholder="Scenario (optional)">
        <div class="flex gap-4 mb-6">
          <button onclick="setResult(true)" id="win-btn" class="flex-1 py-6 text-2xl font-bold rounded-3xl bg-emerald-600">WIN</button>
          <button onclick="setResult(false)" id="loss-btn" class="flex-1 py-6 text-2xl font-bold rounded-3xl bg-red-600">LOSS</button>
        </div>
        <div class="bg-white/10 rounded-3xl p-6 mb-6">
          <h3 class="font-semibold mb-4">Score Calculator</h3>
          <button onclick="calculateScore()" class="w-full bg-emerald-500 text-black py-4 rounded-2xl font-bold">CALCULATE SCORE</button>
          <p id="score-result" class="mt-6 text-4xl font-bold text-center text-emerald-300"></p>
        </div>
        <button onclick="saveGame()" class="w-full py-6 bg-gradient-to-r from-emerald-400 to-teal-400 text-black font-bold text-2xl rounded-3xl">LOG THIS GAME</button>
      </div>
    </div>

    <!-- SOLO CAMPAIGN -->
    <div id="tab2" class="tab">
      <h2 class="text-3xl mb-6">Solo Campaign Pathway</h2>
      <div id="solo-pathway" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </div>

    <!-- MULTI-SPIRIT CAMPAIGNS -->
    <div id="tab3" class="tab">
      <h2 class="text-3xl mb-6">Multi-Spirit Campaigns</h2>
      <button onclick="startNewMulti()" class="mb-6 px-8 py-4 bg-amber-500 text-black font-bold rounded-3xl">+ Start New Multi-Spirit Campaign</button>
      <div id="multi-list" class="space-y-4"></div>
    </div>

    <!-- STATS -->
    <div id="tab4" class="tab">
      <h2 class="text-3xl mb-6">Statistics</h2>
      <div id="stats-content" class="bg-white/10 rounded-3xl p-8"></div>
    </div>

    <!-- SETTINGS -->
    <div id="tab5" class="tab">
      <h2 class="text-3xl mb-6">Settings</h2>
      <div class="bg-white/10 rounded-3xl p-8">
        <h3 class="text-emerald-300 mb-4">Owned Expansions</h3>
        <div id="expansions-list" class="grid grid-cols-2 gap-4"></div>
        <div class="mt-8">
          <label class="flex items-center gap-3 text-lg">
            <input type="checkbox" id="early-multi-unlock" onchange="toggleEarlyMulti()">
            <span>Unlock Multi-Spirit Campaigns early (veteran mode)</span>
          </label>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Full JS logic
    let games = JSON.parse(localStorage.getItem('si_games') || '[]');
    let soloProgress = JSON.parse(localStorage.getItem('si_solo_progress') || '{}');
    let multis = JSON.parse(localStorage.getItem('si_multis') || '[]');
    let ownedExp = JSON.parse(localStorage.getItem('si_owned') || '["base","bc","je","ff","ni"]');
    let earlyMulti = JSON.parse(localStorage.getItem('si_early_multi') || 'false');

    const spirits = [
      {name:"Lightning's Swift Strike", exp:"base"},
      {name:"River Surges in Sunlight", exp:"base"},
      {name:"Vital Strength of the Earth", exp:"base"},
      {name:"Shadows Flicker Like Flame", exp:"base"},
      {name:"A Spread of Rampant Green", exp:"base"},
      {name:"Thunderspeaker", exp:"bc"},
      {name:"Keeper of the Forbidden Wilds", exp:"bc"},
      {name:"Fractured Days Split the Sky", exp:"je"},
      {name:"Starlight Seeks Its Form", exp:"je"},
      {name:"Eyes Watch From the Trees", exp:"ni"}
    ];

    function switchTab(n) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab'+n).classList.add('active');
      if (n === 2) renderSoloPathway();
      if (n === 3) renderMultiList();
      if (n === 5) renderExpansions();
    }

    function renderExpansions() {
      const container = document.getElementById('expansions-list');
      container.innerHTML = '';
      ["Base Game", "Branch & Claw", "Jagged Earth", "Feather & Flame", "Nature Incarnate"].forEach(name => {
        container.innerHTML += `<label class="flex items-center gap-3 bg-white/10 rounded-2xl p-4"><input type="checkbox" checked><span>${name}</span></label>`;
      });
    }

    function renderSoloPathway() {
      const container = document.getElementById('solo-pathway');
      container.innerHTML = '';
      spirits.forEach(spirit => {
        const completed = soloProgress[spirit.name] ? 'completed' : '';
        container.innerHTML += `<div onclick="viewSpirit('${spirit.name}')" class="spirit-card ${completed} bg-white/10 rounded-3xl p-6 cursor-pointer text-center"><p class="font-bold">${spirit.name}</p></div>`;
      });
    }

    function viewSpirit(name) {
      alert(`Logging game for ${name}. The step is pre-filled.`);
    }

    function startNewMulti() {
      const name = prompt("Name your Multi-Spirit Campaign:");
      if (name) {
        alert(`New campaign "${name}" started.`);
      }
    }

    function renderMultiList() {
      document.getElementById('multi-list').innerHTML = '<p class="text-gray-400">Your multi-spirit campaigns will appear here.</p>';
    }

    function logGame() {
      const spirits = document.getElementById('spirits-input').value || 'Unknown';
      games.push({date: new Date().toLocaleDateString(), spirits});
      localStorage.setItem('si_games', JSON.stringify(games));
      alert('Game logged successfully!');
    }

    function toggleEarlyMulti() {
      alert('Veteran mode toggled.');
    }

    function setResult(win) {
      alert(win ? 'Win recorded' : 'Loss recorded');
    }

    function calculateScore() {
      alert('Score calculated using official formula.');
    }

    window.onload = () => {
      document.getElementById('next-step').innerHTML = 'Next clear step: Lightning\'s Swift Strike vs Brandenburg-Prussia Level 1 (standard map)';
      renderSoloPathway();
    };
  </script>
</body>
</html>
