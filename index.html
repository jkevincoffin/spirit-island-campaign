<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spirit Island Campaign</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style> body {font-family: system-ui;} .tab {display:none;} .tab.active {display:block;} </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
  <div class="max-w-5xl mx-auto p-6">
    <h1 class="text-4xl font-bold mb-8 flex items-center gap-3"><i class="fa-solid fa-leaf text-emerald-400"></i> Spirit Island Campaign</h1>
    
    <div class="flex gap-2 mb-8 border-b border-white/20 pb-2">
      <button onclick="switchTab(0)" class="tab-button px-6 py-3 rounded-t-xl border-b-4 border-transparent hover:border-emerald-400">Dashboard</button>
      <button onclick="switchTab(1)" class="tab-button px-6 py-3 rounded-t-xl border-b-4 border-transparent hover:border-emerald-400">Log Game</button>
      <button onclick="switchTab(2)" class="tab-button px-6 py-3 rounded-t-xl border-b-4 border-transparent hover:border-emerald-400">Solo Campaign</button>
    </div>

    <div id="tab0" class="tab active">Dashboard content - refresh to see saved games</div>
    <div id="tab1" class="tab">Log Game form coming in next update</div>
    <div id="tab2" class="tab">Solo Pathway - your progress will appear here</div>
  </div>

  <script>
    function switchTab(n) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab'+n).classList.add('active');
    }

    // Basic localStorage demo
    let games = JSON.parse(localStorage.getItem('si_games') || '[]');
    console.log('Saved games:', games);
    alert('App loaded! Click tabs. Log a game to test saving.');
  </script>
</body>
</html>
