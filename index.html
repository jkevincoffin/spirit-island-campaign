<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spirit Island Campaign</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    .tab { display: none; }
    .tab.active { display: block; }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
  <div class="max-w-6xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold flex items-center gap-3"><i class="fa-solid fa-leaf text-emerald-400"></i> Spirit Island Campaign</h1>
      <div class="flex gap-2">
        <button onclick="switchTab(0)" class="px-6 py-3 rounded-xl hover:bg-white/10">🏠 Dashboard</button>
        <button onclick="switchTab(1)" class="px-6 py-3 rounded-xl hover:bg-white/10">📝 Log Game</button>
        <button onclick="switchTab(2)" class="px-6 py-3 rounded-xl hover:bg-white/10">🛤️ Solo Campaign</button>
        <button onclick="switchTab(3)" class="px-6 py-3 rounded-xl hover:bg-white/10">⚙️ Settings</button>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="tab0" class="tab active">
      <div id="next-step" class="bg-emerald-900/50 p-8 rounded-3xl text-xl mb-8"></div>
      <p class="text-sm text-gray-400">Games logged: <span id="game-count">0</span></p>
    </div>

    <!-- Log Game -->
    <div id="tab1" class="tab">
      <h2 class="text-3xl mb-6">Log a Game</h2>
      <div class="space-y-6 max-w-md">
        <input id="spirits" placeholder="Spirit(s) e.g. River Surges" class="w-full bg-white/10 p-4 rounded-2xl">
        <input id="adversary" placeholder="Adversary" class="w-full bg-white/10 p-4 rounded-2xl">
        <input id="level" type="number" value="0" class="w-full bg-white/10 p-4 rounded-2xl">
        <button onclick="logGame()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-bold py-6 rounded-3xl text-xl">LOG GAME & CALCULATE SCORE</button>
      </div>
    </div>

    <!-- Solo Campaign -->
    <div id="tab2" class="tab">
      <h2 class="text-3xl mb-6">Solo Campaign Pathway</h2>
      <div id="pathway" class="space-y-4"></div>
    </div>

    <!-- Settings -->
    <div id="tab3" class="tab">
      <h2 class="text-3xl mb-6">Settings</h2>
      <p>Expansion toggles and advanced options coming in next update.</p>
    </div>
  </div>

  <script>
    let games = JSON.parse(localStorage.getItem('si_games') || '[]');

    function switchTab(n) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab' + n).classList.add('active');
    }

    function logGame() {
      const entry = {
        date: new Date().toLocaleDateString(),
        spirits: document.getElementById('spirits').value || 'Unknown',
        adversary: document.getElementById('adversary').value || 'None',
        level: document.getElementById('level').value
      };
      games.push(entry);
      localStorage.setItem('si_games', JSON.stringify(games));
      document.getElementById('game-count').textContent = games.length;
      alert('Game logged successfully!');
    }

    // Initial render
    document.getElementById('game-count').textContent = games.length;
    document.getElementById('next-step').innerHTML = `<p class="text-emerald-300">Next recommended: Play an easy spirit at low difficulty</p>`;
  </script>
</body>
</html>
